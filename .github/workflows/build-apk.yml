name: Build Bellwether APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Restore project
        shell: bash
        run: |
          echo '' | base64 -d > /tmp/bwsrc.tgz
          tar -xzf /tmp/bwsrc.tgz
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - name: Build release APK
        run: gradle assembleRelease --no-daemon
      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk Bellwether_90_Android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: Bellwether_90_Android
          path: Bellwether_90_Android.apk
